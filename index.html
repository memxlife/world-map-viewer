<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>World Map Viewer</title>
    <link rel="stylesheet" href="./styles.css?v=92" />
    <script>
      if (window.location.protocol === "file:") {
        const marker = "/EmbodiedAI/";
        const path = window.location.pathname;
        const index = path.indexOf(marker);
        const relativePath = index >= 0 ? path.slice(index + marker.length) : "index.html";
        const defaultSearch = "?v=92&benchmark=/research-problems/anchor_point_capture/benchmarks/synthetic_two_cube_six_orbit_cross_lines_smooth_dense_horizontal_plus_vertical&color=rgb&anchors=1&meshes=1&boundaryPoints=0&data=/research-problems/poisson_surface_reconstruction/generated/reports/oracle_normals_anchor_capture/poisson_oracle_normals_viewer_world_map.json";
        window.location.replace(`http://127.0.0.1:8830/${relativePath}${window.location.search || defaultSearch}`);
      }
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <main class="workspace">
      <section class="pane benchmark-pane">
        <header class="pane-header">
          <div>
            <h1>Benchmark</h1>
            <p id="benchmarkStatus">Loading benchmark...</p>
          </div>
          <button id="loadBenchmarkBtn" type="button">Load Benchmark</button>
        </header>

        <details class="benchmark-details">
          <summary>Benchmark controls and camera view</summary>

          <div class="controls-grid">
            <label class="field">
              <span>Preset</span>
              <select id="benchmarkPreset"></select>
            </label>
            <label class="field wide-field">
              <span>Benchmark directory</span>
              <input id="benchmarkPath" type="text" />
            </label>
          </div>

          <section class="large-view">
            <div class="view-header">
              <h2>Egocentric Camera View</h2>
              <span id="cameraCaption">-</span>
            </div>
            <img id="cameraImage" alt="Selected benchmark egocentric camera frame" />
          </section>

          <label class="field frame-control">
            <span>Benchmark Frame <strong id="benchmarkFrameLabel">-</strong></span>
            <input id="benchmarkFrameSlider" type="range" min="0" max="0" step="1" value="0" />
          </label>
        </details>
      </section>

      <section class="pane result-pane">
        <header class="pane-header">
          <div>
            <h1>Result</h1>
            <p id="resultStatus">Loading reconstruction...</p>
          </div>
          <div class="header-actions">
            <button id="loadResultBtn" type="button">Load Result</button>
            <button id="resetBtn" type="button">Reset View</button>
          </div>
        </header>

        <div class="controls-grid result-controls">
          <label class="field">
            <span>Preset</span>
            <select id="resultPreset"></select>
          </label>
          <label class="field wide-field">
            <span>World map JSON</span>
            <input id="dataPath" type="text" />
          </label>
          <label class="field">
            <span>Result Frame <strong id="resultFrameLabel">-</strong></span>
            <input id="resultFrameSlider" type="range" min="0" max="0" step="1" value="0" />
          </label>
          <label class="field">
            <span>Point Size <strong id="pointSizeLabel"></strong></span>
            <input id="pointSize" type="range" min="0.006" max="0.05" step="0.002" value="0.018" />
          </label>
          <label class="field">
            <span>Color Mode</span>
            <select id="colorMode">
              <option value="rgb">Remembered RGB</option>
              <option value="kind">Anchor vs Grown</option>
              <option value="face">Face/Object ID</option>
              <option value="firstSeen">First Seen Time</option>
            </select>
          </label>
          <label class="field">
            <span>Boundary Result</span>
            <select id="boundarySource">
              <option value="all">All boundary results</option>
            </select>
          </label>
          <fieldset class="field layer-toggles wide-display-field">
            <legend>Display Layers</legend>
            <label><input id="showAnchors" type="checkbox" checked /> Anchor points</label>
            <label><input id="showMeshes" type="checkbox" checked /> Surfaces / meshes</label>
            <label><input id="showBoundaries" type="checkbox" /> Boundary points / lines</label>
            <label><input id="showNormals" type="checkbox" /> Estimated normals</label>
            <label><input id="showTrajectory" type="checkbox" checked /> Camera trajectory</label>
            <label><input id="showAxes" type="checkbox" checked /> Axes</label>
            <label><input id="showGrowthLinks" type="checkbox" /> Growth links</label>
            <label><input id="showSameSurface" type="checkbox" /> Same-surface hypotheses</label>
          </fieldset>
        </div>

        <div class="result-layout">
          <section id="viewport">
            <canvas id="scene"></canvas>
          </section>

          <aside class="result-side">
            <section class="metrics">
              <div><span>Voxels</span><strong id="metricVoxels">-</strong></div>
              <div><span>Result Frames</span><strong id="metricResultFrames">-</strong></div>
              <div><span>Anchors</span><strong id="metricAnchors">-</strong></div>
              <div><span>Grown</span><strong id="metricGrown">-</strong></div>
              <div><span>Coverage</span><strong id="metricCoverage">-</strong></div>
              <div><span>Visible Now</span><strong id="metricVisible">-</strong></div>
              <div><span>Occluded</span><strong id="metricOccluded">-</strong></div>
            </section>

            <section class="legend">
              <h2>Face IDs</h2>
              <div id="legend"></div>
            </section>
          </aside>
        </div>
      </section>
    </main>

    <script type="module" src="./viewer.js?v=92"></script>
  </body>
</html>
